name: voyager_sanctuary
description: "Voyager Sanctuary — Goal execution app. Refined Architectural Luxury."
publish_to: 'none'

version: 0.1.1+8

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Backend
  firebase_core: ^3.8.1             # Firebase initialization (FlutterFire)
  supabase_flutter: ^2.8.4          # Supabase client: Auth, DB, realtime

  # State management
  flutter_riverpod: ^2.6.1          # Provider framework
  riverpod_annotation: ^2.6.1       # Code-gen annotations

  # Navigation
  go_router: ^14.8.1                # Declarative routing + auth guards

  # Animations
  flutter_animate: ^4.5.2           # Chainable animations (hearth burn, stone shatter)

  # Date/Time
  intl: ^0.20.2                     # Date formatting, locale
  shared_preferences: ^2.3.3        # Local state (time-of-day cache, etc.)

  # UI utilities
  path_provider: ^2.1.5
  cupertino_icons: ^1.0.8
  uuid: ^4.5.3
  flutter_slidable: ^3.1.1
  audioplayers: ^6.0.0
  just_audio: ^0.9.40

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3        # Code-gen for providers
  build_runner: ^2.4.13             # Runs riverpod_generator

flutter:
  uses-material-design: true

  assets:
    - assets/backgrounds/
    - assets/elias/
    - assets/hearth/
    - assets/satchel/
    - assets/mallet/
    - assets/sounds/
    - assets/images/
    - assets/stones/
