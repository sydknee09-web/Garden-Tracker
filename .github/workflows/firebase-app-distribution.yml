# Build release APK and upload to Firebase App Distribution on push to main/master.
#
# One-time setup (repo Settings → Secrets → Actions):
#   1. On your PC: firebase login:ci
#   2. Add secret FIREBASE_TOKEN with the printed token.
#
# Version code uses 3_000_000 + run_number so it stays above typical local +NN bumps.

name: Firebase App Distribution

on:
  push:
    branches: [main, master]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'android/**'
      - '.github/workflows/firebase-app-distribution.yml'
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Build APK
        run: |
          set -e
          VERSION_LINE=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
          NAME="${VERSION_LINE%+*}"
          BN=$((3000000 + ${{ github.run_number }}))
          flutter pub get
          flutter build apk --release --build-name="$NAME" --build-number=$BN

      - name: Upload to App Distribution
        if: ${{ secrets.FIREBASE_TOKEN != '' }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase appdistribution:distribute build/app/outputs/flutter-apk/app-release.apk \
            --app "1:826880639726:android:095964bfe47ee3945aa9ff" \
            --groups "testers" \
            --release-notes "CI build ${{ github.run_number }} (${{ github.sha }})"

      - name: Missing FIREBASE_TOKEN
        if: ${{ secrets.FIREBASE_TOKEN == '' }}
        run: |
          echo "::warning::FIREBASE_TOKEN secret not set — skipping App Distribution upload. Run firebase login:ci and add the token under repo Settings → Secrets → Actions."
